<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - FastBite</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../static/css/menu.css" th:href="@{/css/menu.css}">
</head>
<body>
<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="fas fa-hamburger"></i> FastBite</a>
        <div class="navbar-nav ms-auto">
            <a href="/" class="btn btn-outline-light">
                <i class="fas fa-home"></i> Home
            </a>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="confirmation-card text-center">
                <!-- Error Icon -->
                <div class="mb-4">
                    <i class="fas fa-exclamation-circle text-danger" style="font-size: 5rem;"></i>
                </div>

                <!-- Error Title -->
                <h2 class="text-danger mb-3">Oops! Something went wrong</h2>

                <!-- Error Message -->
                <p class="text-muted mb-4">
                    We're sorry, but we encountered an unexpected error while processing your request.
                </p>

                <!-- Error Details (Optional - use Thymeleaf to show/hide) -->
                <div class="order-summary text-start mb-4" th:if="${error}">
                    <h6 class="fw-bold mb-3"><i class="fas fa-info-circle me-2"></i>Error Details</h6>
                    <div class="mb-2">
                        <strong>Status:</strong>
                        <span th:text="${status}" class="text-danger">500</span>
                    </div>
                    <div class="mb-2">
                        <strong>Message:</strong>
                        <span th:text="${message}">Internal Server Error</span>
                    </div>
                    <div class="mb-2">
                        <strong>Timestamp:</strong>
                        <span th:text="${timestamp}">2024-01-15 10:30:45</span>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="mt-4">
                    <a href="javascript:history.back()" class="btn btn-outline-secondary btn-lg me-2">
                        <i class="fas fa-arrow-left"></i> Go Back
                    </a>
                    <a href="/menu" class="btn btn-primary btn-lg">
                        <i class="fas fa-home"></i> Go to Home
                    </a>
                </div>

                <!-- Help Text -->
                <div class="mt-4 pt-4" style="border-top: 2px solid #dee2e6;">
                    <p class="text-muted small mb-2">
                        <i class="fas fa-question-circle me-1"></i>
                        Need help? Contact our support team
                    </p>
                    <a href="mailto:support@fastbite.com" class="text-decoration-none">
                        <i class="fas fa-envelope me-1"></i> support@fastbite.com
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
