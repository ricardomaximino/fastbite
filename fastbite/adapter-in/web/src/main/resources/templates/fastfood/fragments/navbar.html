<th:block th:fragment="navbar(activeTab)" xmlns:sec="http://www.w3.org/1999/xhtml">
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center" th:href="@{/menu}">
                <div class="bg-white rounded-circle p-1 me-2 shadow-sm">
                    <i class="fas fa-hamburger text-primary"></i>
                </div>
                <span class="fw-800" th:text="#{logo.title}">FastBite</span>
            </a>
            
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">
                <!-- Center Links: Role-based -->
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-2" sec:authorize="isAuthenticated()">
                    <!-- Menu Link (Everyone) -->
                    <li class="nav-item">
                        <a class="nav-link px-3 rounded-pill" th:href="@{/menu}" 
                           th:classappend="${activeTab == 'menu' ? 'active glass-bg' : ''}">
                            <i class="fas fa-utensils me-1"></i> <span th:text="#{menu.title}">Menu</span>
                        </a>
                    </li>
                    
                    <!-- Dashboard Link (Staff) -->
                    <li class="nav-item" sec:authorize="hasAnyRole('ADMIN', 'MANAGER', 'CASHIER', 'COOK', 'WAITER')">
                        <a class="nav-link px-3 rounded-pill" th:href="@{/dashboard}" 
                           th:classappend="${activeTab == 'dashboard' ? 'active glass-bg' : ''}">
                            <i class="fas fa-tachometer-alt me-1"></i> <span th:text="#{label.dashboard}">Dashboard</span>
                        </a>
                    </li>
                    
                    <!-- Counter Link (Staff) -->
                    <li class="nav-item" sec:authorize="hasAnyRole('ADMIN', 'MANAGER', 'CASHIER', 'COOK', 'WAITER')">
                        <a class="nav-link px-3 rounded-pill" th:href="@{/counter}" 
                           th:classappend="${activeTab == 'counter' ? 'active glass-bg' : ''}">
                            <i class="fas fa-cash-register me-1"></i> <span th:text="#{page.title.counter}">Counter</span>
                        </a>
                    </li>
                    
                    <!-- BackOffice Link (Admin/Manager) -->
                    <li class="nav-item" sec:authorize="hasAnyRole('ADMIN', 'MANAGER')">
                        <a class="nav-link px-3 rounded-pill" th:href="@{/backoffice}" 
                           th:classappend="${activeTab == 'backoffice' ? 'active glass-bg' : ''}">
                            <i class="fas fa-user-shield me-1"></i> <span th:text="#{backoffice.title}">BackOffice</span>
                        </a>
                    </li>
                </ul>

                <!-- Right Side: User Info & Actions -->
                <div class="navbar-nav ms-auto align-items-center gap-3">
                    <!-- Cart Button (Only on Menu page) -->
                    <button th:if="${activeTab == 'menu'}" 
                            class="btn btn-glass position-relative py-2 px-3 rounded-pill shadow-sm" id="navBarCheckoutBtn">
                        <i class="fas fa-shopping-basket me-1"></i>
                        <span class="d-none d-sm-inline" th:text="#{label.cart}">Cart</span>
                        <span class="cart-badge bg-white text-primary fw-bold ms-2" id="cartCount">0</span>
                    </button>

                    <!-- User Profile & Logout -->
                    <div class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle glass-bg px-3 py-1 rounded-pill d-flex align-items-center" 
                           href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="fas fa-user-circle me-2"></i>
                            <span class="small fw-bold" sec:authentication="name">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-4 mt-2" aria-labelledby="userDropdown">
                            <li class="px-3 py-2 border-bottom">
                                <div class="d-flex align-items-center">
                                    <div class="bg-light rounded-circle p-2 me-2">
                                        <i class="fas fa-user text-primary"></i>
                                    </div>
                                    <div>
                                        <div class="small fw-bold" sec:authentication="name">Username</div>
                                        <div class="smaller text-muted" sec:authentication="principal.authorities">Roles</div>
                                    </div>
                                </div>
                            </li>
                            <li>
                                <form th:action="@{/logout}" method="post" class="m-0">
                                    <button type="submit" class="dropdown-item py-2 text-danger">
                                        <i class="fas fa-sign-out-alt me-2"></i> <span th:text="#{button.logout}">Logout</span>
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </div>

                    <!-- Login Button (Not Authenticated) -->
                    <a sec:authorize="!isAuthenticated()" th:href="@{/login}" 
                       class="btn btn-outline-light rounded-pill px-4 shadow-sm">
                        <i class="fas fa-sign-in-alt me-2"></i> <span th:text="#{button.login}">Login</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>
</th:block>
