<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{page.title}">FastBite - Order Online</title>
    <link href="/webjars/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="/webjars/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-hamburger"></i> <span
                    th:text="#{logo.title}">FastBite</span></a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
        <!-- Step Indicator -->
        <div class="step-indicator">
            <div class="step completed" id="step1">1</div>
            <div class="step completed" id="step2">2</div>
            <div class="step completed" id="step3">3</div>
            <div class="step completed" id="step4">4</div>
        </div>

        <!-- Success Section -->
        <div id="successSection">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="confirmation-card text-center">
                        <div class="confirmation-header">
                            <i class="fas fa-check-circle text-success fa-5x mb-3"></i>
                            <h2 class="text-success mb-2" th:text="#{message.order.submitted.successfully}">Order
                                Submitted Successfully!</h2>
                            <p class="text-muted" th:text="#{message.thank.you.details}">Gracias por tu pedido. Lo
                                estamos preparando ya.</p>
                        </div>

                        <div class="py-4">
                            <h6 class="text-muted text-uppercase fw-bold mb-2" th:text="#{label.order.number}">Order
                                Number</h6>
                            <h1 class="display-1 fw-bold text-dark" th:text="${orderNumber}" id="orderNumber"
                                style="font-size: 8rem;">100</h1>
                        </div>

                        <div class="bg-light p-3 rounded-4 mb-4 border">
                            <p class="mb-0 text-muted">
                                <i class="fas fa-info-circle me-2"></i>
                                <span th:text="#{message.you.will.receive.a.confirmation.email.shortly}">You will
                                    receive a confirmation email shortly.</span>
                            </p>
                        </div>

                        <div class="d-grid gap-3">
                            <a href="/menu" class="btn btn-pos-primary btn-lg rounded-pill" id="startNewOrderBtn">
                                <i class="fas fa-arrow-left me-2"></i> <span
                                    th:text="#{button.place.another.order}">Place Another Order</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
