<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{page.title}">FastBite - Order Online</title>
    <link href="/webjars/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="/webjars/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../static/css/menu.css" th:href="@{/css/menu.css}">
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

</head>

<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-hamburger"></i> <span
                    th:text="#{logo.title}">FastBite</span></a>
            <div class="navbar-nav ms-auto align-items-center">
                <div class="nav-item me-3" sec:authorize="isAuthenticated()">
                    <span class="text-white small me-2">
                        <i class="fas fa-user-circle"></i> <span sec:authentication="name">User</span>
                    </span>
                    <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">
                        <i class="fas fa-tachometer-alt"></i> <span th:text="#{label.dashboard}">Dashboard</span>
                    </a>
                </div>
                <div class="nav-item me-3" sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}" class="btn btn-outline-light btn-sm">
                        <i class="fas fa-sign-in-alt"></i> <span th:text="#{button.login}">Login</span>
                    </a>
                </div>
                <button class="btn btn-outline-light position-relative" id="navBarCheckoutBtn">
                    <i class="fas fa-shopping-cart"></i> <span th:text="#{label.cart}">Cart</span>
                    <span class="cart-badge" id="cartCount">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
        <!-- Step Indicator -->
        <div class="step-indicator">
            <div class="step active" id="step1">1</div>
            <div class="step" id="step2">2</div>
            <div class="step" id="step3">3</div>
            <div class="step" id="step4">4</div>
        </div>

        <!-- Menu Section -->
        <div id="menuSection">
            <h2 class="text-center mb-4" th:text="#{menu.title}">Our Delicious Menu</h2>

            <!-- Navigation Tabs -->
            <ul class="nav nav-tabs justify-content-center mb-4" id="menuTabs"
                th:data-available-tabs="${menuData.availableTabsId}">
                <li class="nav-item" th:each="tab,index : ${menuData.availableTabs}">
                    <button class="nav-link" th:classappend="${index.first}? ' active' : ''" data-bs-toggle="tab"
                        th:data-bs-target="${'#' + tab.id}" type="button">
                        <i class="fas fa-utensils"></i> <span th:text="${tab.name}">Combos</span>
                    </button>
                </li>
            </ul>

            <!-- Tab Content -->
            <div class="tab-content" id="menuTabContent">
                <!-- Tab -->
                <div class="tab-pane fade show" th:classappend="${index.first}? ' active' : ''" th:id="${tab.id}"
                    id="combos" th:each="tab,index : ${menuData.availableTabs}">
                    <div class="row" id="combosContainer">
                        <!-- Combo items will be populated by thymeleaf -->
                        <div class="col-lg-4 col-md-6 mb-4" th:each="product : ${menuData.menuDataMap[tab.id]}"
                            th:id="${product.id}" th:data-customizations="${product.customizationsAsString}"
                            th:data-name="${product.name}" th:data-description="${product.description}"
                            th:data-image="${product.image}" th:data-price="${product.price}">
                            <div class="card product-card h-100">
                                <img th:src="${product.image}"
                                    src="https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=400&h=300&fit=crop"
                                    class="product-img" th:alt="${product.name}">
                                <div class="card-body d-flex flex-column">
                                    <h5 class="card-title" th:text="${product.name}">Family Feast Combo</h5>
                                    <p class="card-text text-muted" th:text="${product.description}">4 burgers, 2 large
                                        fries, 4 drinks</p>
                                    <div class="mt-auto">
                                        <div class="d-flex justify-content-between align-items-center mb-3">
                                            <span class="price-tag" th:text="${product.price}">24.99</span>
                                            <div class="quantity-control">
                                                <button class="quantity-btn" th:id="${'qty-' + product.id + '-minus'}"
                                                    id="qty-product-one-minus">-</button>
                                                <span class="mx-2" th:id="${'qty-' + product.id}"
                                                    id="qty-product-one">1</span>
                                                <button class="quantity-btn" th:id="${'qty-' + product.id + '-plus'}"
                                                    id="qty-product-one-plus">+</button>
                                            </div>
                                        </div>
                                        <button class="btn btn-add-to-cart w-100"
                                            th:id="${'add-' + product.id + '-to-cart'}">
                                            <i class="fas fa-plus"></i> <span th:text="#{label.add.to.cart}">Add to
                                                Cart</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- Cart Section -->
        <div id="cartSection" style="display: none;"></div>

        <!-- Confirmation Section -->
        <div id="confirmationSection" style="display: none;"></div>

    </div>

    <!-- Customization Modal -->
    <div class="modal fade" th:data-available-customizations="${menuData.availableCustomizations}"
        id="customizationsModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" th:data-title="#{customizer.title}">Customize Your Order</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <!-- Product Image Section -->
                        <div class="col-md-4 mb-3">
                            <img id="modalProductImage" src="" alt="Product" class="img-fluid rounded shadow-sm">
                        </div>

                        <!-- Customizations Section -->
                        <div class="col-md-8">
                            <div id="customizations">
                                <!-- Customization options will be populated here -->
                                <div class="mb-4" th:id="${customization.id}"
                                    th:each="customization : ${menuData.customizations}">
                                    <h6 class="fw-bold"><i class="fas fa-utensils me-2"></i><span
                                            th:text="${customization.name}">Size</span></h6>
                                    <div class="form-check customization-item"
                                        th:if="${customization.inputType.value != 'hidden'}"
                                        th:each="customizationOption : ${customization.options}">
                                        <input class="form-check-input" th:type="${customization.inputType.value}"
                                            th:name="${customization.inputType.value == 'radio'}? (${customization.id}) : (${customizationOption.id})"
                                            th:id="${customizationOption.id}" th:value="${customizationOption.name}"
                                            th:data-price="${customizationOption.price}"
                                            th:data-selected-by-default="${customizationOption.isSelectedByDefault()}"
                                            th:data-default-value="${customizationOption.defaultValue}" type="radio"
                                            name="optionId" value="Small" id="optionId" data-price="1.10" />
                                        <label class="form-check-label"
                                            th:for="${customization.inputType.value == 'radio'}? (${customization.id}) : (${customizationOption.id})"
                                            for="optionId">
                                            <span th:text="${customizationOption.name}"></span> <span
                                                th:if="${customizationOption.price > 0}"
                                                th:text="${customizationOption.price}"></span>
                                        </label>
                                    </div>
                                    <div class="ingredient-control" th:if="${customization.inputType.value == 'hidden'}"
                                        th:each="customizationOption : ${customization.options}">
                                        <div class="ingredient-info">
                                            <div class="ingredient-name" th:text="${customizationOption.name}">Onions
                                            </div>
                                            <div class="ingredient-price" th:if="${customizationOption.price > 0}"
                                                th:text="${customizationOption.price}">1.00</div>
                                        </div>
                                        <div class="ingredient-quantity-control">
                                            <button type="button" class="ingredient-btn"
                                                th:id="${'qty-' + customizationOption.id + '-minus'}"
                                                id="qty-hidden-option-minus">
                                                <i class="fas fa-minus"></i>
                                            </button>
                                            <span th:id="${'qty-' + customizationOption.id}" class="ingredient-quantity"
                                                id="qty-hidden-option">1</span>
                                            <button type="button" class="ingredient-btn"
                                                th:id="${'qty-' + customizationOption.id + '-plus'}"
                                                id="qty-hidden-option-plus" disabled>
                                                <i class="fas fa-plus"></i>
                                            </button>
                                        </div>
                                        <input th:type="${customization.inputType.value}"
                                            th:name="${customizationOption.name}" th:id="${customizationOption.id}"
                                            th:data-no="#{customizer.type.toggle.without}"
                                            th:data-name="${customizationOption.name}"
                                            th:data-price="${customizationOption.price}"
                                            th:data-default-value="${customizationOption.defaultValue}" type="hidden"
                                            id="hidden-option" value="1" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="customizationCancelBtn"
                        th:text="#{button.cancel}">Cancel</button>
                    <button type="button" class="btn btn-primary" id="customizationSubmitBtn"
                        th:text="#{button.add.to.cart}">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>
    <div style="display:none" id="dictionary" th:data-dictionary-empty-cart="${menuData.dictionary.cartEmpty}"
        th:data-dictionary-confirm-and-submit-btn="${menuData.dictionary.confirmAndSubmitBtn}"
        th:data-dictionary-order-confirmation="${menuData.dictionary.orderConfirmation}"
        th:data-dictionary-order-items="${menuData.dictionary.orderItems}"
        th:data-dictionary-order-total="${menuData.dictionary.orderTotal}"
        th:data-dictionary-total="${menuData.dictionary.total}"
        th:data-dictionary-subtotal="${menuData.dictionary.subtotal}"
        th:data-dictionary-tax="${menuData.dictionary.tax}">
    </div>

    <script src="/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="../../static/js/menu.js" th:src="@{/js/menu.js}" defer></script>
</body>

</html>
