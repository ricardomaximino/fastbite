<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{page.title.counter}">FastBite - Counter POS</title>
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

    <link rel="stylesheet" href="/webjars/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="/webjars/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="pos-container">
        <div class="cart-overlay" id="cart-overlay"></div>
        <div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 2000;"></div>
        <!-- Categories Sidebar -->
        <div class="pos-sidebar">
            <div class="p-3 bg-dark text-center">
                <a th:href="@{/dashboard}">
                    <h4 class="m-0 text-white"><i class="fas fa-utensils me-2"></i><span
                        th:text="#{logo.title}">FastBite</span></h4>
                </a>
            </div>
            <div class="cart-items flex-grow-1" id="categories-sidebar">
                <!-- Rendered JS -->
                <div class="category-item active" data-group-id="all">
                    <i class="fas fa-th me-2"></i> <span th:text="#{label.all.products}">All Products</span>
                </div>
            </div>
            <div class="p-3 mt-auto">
                <div class="d-flex align-items-center mb-3">
                    <div class="flex-grow-1">
                        <small class="text-white-50" th:text="#{label.logged.in.as}">Logged in as</small>
                        <div class="fw-bold" sec:authentication="name">User</div>
                    </div>
                </div>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-light btn-sm w-100">
                        <i class="fas fa-sign-out-alt me-1"></i> <span th:text="#{button.logout}">Logout</span>
                    </button>
                </form>
            </div>
        </div>

        <!-- Main Product Area -->
        <div class="pos-main">
            <header class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm">
                <div class="input-group w-50">
                    <span class="input-group-text bg-transparent border-end-0"><i class="fas fa-search"></i></span>
                    <input type="text" class="form-control border-start-0" id="productSearch"
                        th:placeholder="#{placeholder.search.products}">
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-secondary" id="btn-select-table">
                        <i class="fas fa-table me-1"></i> <span id="selected-table-name"
                            th:text="#{label.assign.table}">Assign Table</span>
                    </button>
                    <a th:href="@{/dashboard}" class="btn btn-outline-primary">
                        <i class="fas fa-columns me-1"></i> <span th:text="#{button.dashboard}">Dashboard</span>
                    </a>
                </div>
            </header>

            <div class="row g-3" id="products-grid">
                <!-- Rendered JS -->
            </div>
        </div>

        <!-- Cart Sidebar -->
        <div class="pos-cart">
            <div class="cart-header d-flex justify-content-between align-items-center">
                <h5 class="m-0"><i class="fas fa-receipt me-2"></i> <span th:text="#{label.current.order}">Current
                        Order</span></h5>
                <div class="d-flex gap-2 align-items-center">
                    <button class="btn btn-sm btn-outline-light" id="btn-clear-cart" th:title="#{button.clear}">
                        <i class="fas fa-trash-alt"></i> <span th:text="#{button.clear}">CLEAR</span>
                    </button>
                    <button class="btn-close btn-close-white d-lg-none" id="btn-close-cart"></button>
                </div>
            </div>
            <div class="cart-items" id="cart-items">
                <div class="text-center py-5 text-muted">
                    <i class="fas fa-shopping-cart fa-3x mb-3 opacity-25"></i>
                    <p th:text="#{message.order.is.empty}">Order is empty</p>
                </div>
            </div>

            <div class="cart-total-section">
                <div class="d-flex justify-content-between mb-2">
                    <span th:text="#{label.subtotal}">Subtotal</span>
                    <span id="cart-subtotal">€0,00</span>
                </div>
                <div class="cart-total-row">
                    <span th:text="#{label.total}">TOTAL</span>
                    <span id="cart-total">€0,00</span>
                </div>
                <div class="d-flex gap-2" id="cart-actions-new">
                    <button class="btn btn-outline-warning flex-grow-1 d-none" id="btn-billing">
                        <i class="fas fa-file-invoice-dollar me-2"></i> <span th:text="#{button.billing}">BILLING</span>
                    </button>
                    <button class="btn btn-outline-primary flex-grow-1" id="btn-assign-table" disabled>
                        <i class="fas fa-table me-2"></i> <span th:text="#{button.assign.to.table}">ASSIGN TO
                            TABLE</span>
                    </button>
                    <button class="btn btn-pos-primary btn-pay flex-grow-1" id="btn-proceed-payment" disabled>
                        <i class="fas fa-credit-card me-2"></i> <span th:text="#{button.pay.now}">PAY NOW</span>
                    </button>
                </div>
                <div class="d-flex gap-2 d-none" id="cart-actions-edit">
                    <button class="btn btn-warning flex-grow-1 py-3 fw-bold" id="btn-save-order">
                        <i class="fas fa-save me-2"></i> <span th:text="#{button.save}">SAVE</span>
                    </button>
                    <button class="btn btn-info flex-grow-1 py-3 fw-bold text-white" id="btn-billing">
                        <i class="fas fa-file-invoice-dollar me-2"></i> <span th:text="#{button.billing}">BILLING</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Table Selection Modal -->
    <div class="modal fade" id="tableModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title" th:text="#{modal.select.table.title}">Select Table</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="table-grid" id="tables-list">
                        <!-- Tables from model -->
                        <div th:each="table : ${tables}" class="table-btn"
                            th:classappend="${table.active ? '' : 'opacity-50 pointer-events-none'}"
                            th:data-id="${table.id}" th:data-name="${table.name}" th:data-status="${table.status}">
                            <div class="status-indicator"
                                th:classappend="${'status-' + table.status.name().toLowerCase()}"></div>
                            <i class="fas fa-chair mb-1"></i><br>
                            <span th:text="${table.name}">T1</span>
                            <div class="table-status-label small" th:text="${table.status}">AVAILABLE</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div class="modal fade" id="paymentModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title" th:text="#{modal.payment.title}">Process Payment</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6 border-end">
                            <h6 class="text-muted mb-3" th:text="#{label.order.summary}">Order Summary</h6>
                            <div class="fs-4 mb-4 fw-bold text-center p-3 bg-light rounded">
                                <span th:text="#{label.total.to.pay}">Total to Pay</span>: <span
                                    id="payment-total">€0,00</span>
                            </div>

                            <h6 class="text-muted mb-2" th:text="#{label.payment.option}">Payment Option</h6>
                            <div class="d-flex gap-2 mb-4">
                                <button class="btn btn-outline-success flex-grow-1 py-3 payment-method-btn active"
                                    data-method="CASH">
                                    <i class="fas fa-money-bill-wave fa-lg"></i><br><span
                                        th:text="#{label.payment.cash}">Cash</span>
                                </button>
                                <button class="btn btn-outline-success flex-grow-1 py-3 payment-method-btn"
                                    data-method="CARD">
                                    <i class="fas fa-credit-card fa-lg"></i><br><span
                                        th:text="#{label.payment.card}">Card</span>
                                </button>
                            </div>

                            <div id="cash-payment-details">
                                <label class="form-label" th:text="#{label.amount.received}">Amount Received</label>
                                <input type="number" class="form-control form-control-lg mb-3" id="received-amount"
                                    step="0.01">
                                <div class="fs-5 text-center p-2 bg-info bg-opacity-10 rounded text-info">
                                    <span th:text="#{label.payment.change}">Change</span>: <span
                                        id="payment-change">€0,00</span>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <h6 class="text-muted mb-3" th:text="#{label.quick.cash}">Quick Cash</h6>
                            <div class="money-grid">
                                <div th:each="denom : ${paymentConfig.moneyDenominations}" class="money-btn"
                                    th:data-value="${denom.value}">
                                    <img th:src="${denom.image}" alt="cash">
                                </div>
                                <!-- Fallback if no images -->
                                <button th:if="${paymentConfig.moneyDenominations.isEmpty()}"
                                    class="btn btn-outline-secondary money-btn-val" data-value="5">5€</button>
                                <button th:if="${paymentConfig.moneyDenominations.isEmpty()}"
                                    class="btn btn-outline-secondary money-btn-val" data-value="10">10€</button>
                                <button th:if="${paymentConfig.moneyDenominations.isEmpty()}"
                                    class="btn btn-outline-secondary money-btn-val" data-value="20">20€</button>
                                <button th:if="${paymentConfig.moneyDenominations.isEmpty()}"
                                    class="btn btn-outline-secondary money-btn-val" data-value="50">50€</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"
                        th:text="#{button.cancel}">Cancel</button>
                    <button type="button" class="btn btn-success px-5 py-2 fw-bold" id="btn-complete-order"
                        th:text="#{button.complete.order}">COMPLETE
                        ORDER</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Customization Modal (reuse if possible, otherwise Pos-specific) -->
    <div class="modal fade" id="customizationModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="product-modal-name" th:text="#{customizer.title}">Customize</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="customization-options">
                    <!-- Dynamic -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary w-100" id="btn-add-with-customs"
                        th:text="#{button.add.to.order}">Add to Order</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Active Orders Modal -->
    <div class="modal fade" id="activeOrdersModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title"><span th:text="#{modal.active.orders.title}">Active Orders</span> - <span
                            id="active-orders-table-name">Table</span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="active-orders-list" class="list-group">
                        <!-- Dynamic -->
                    </div>
                </div>
                <div class="modal-footer d-flex gap-2">
                    <button type="button" class="btn btn-primary flex-grow-1" id="btn-load-table">
                        <i class="fas fa-eye me-2"></i><span th:text="#{button.load.table}">LOAD TABLE</span>
                    </button>
                    <button type="button" class="btn btn-outline-primary flex-grow-1" id="btn-new-order-table">
                        <i class="fas fa-plus me-2"></i><span th:text="#{button.new.order.table}">New Order for this
                            Table</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Reassign Table Modal -->
    <div class="modal fade" id="reassignModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-warning text-dark">
                    <h5 class="modal-title"><i class="fas fa-exchange-alt me-2"></i><span
                            th:text="#{label.reassign}">Reassign Order</span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="reassign-tables-list" class="table-grid">
                        <!-- Dynamic -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile Cart Toggle -->
    <button class="mobile-cart-toggle d-none" id="mobile-cart-toggle">
        <i class="fas fa-shopping-cart"></i>
        <span class="mobile-cart-badge d-none" id="mobile-cart-count">0</span>
    </button>

    <div style="display:none" id="dictionary" th:data-message-item-updated="#{message.item.updated}"
        th:data-message-item-added="#{message.item.added}" th:data-message-item-removed="#{message.item.removed}"
        th:data-message-order-created-success="#{message.order.created.success}"
        th:data-message-order-updated-success="#{message.order.updated.success}"
        th:data-message-table-status-billing="#{message.table.status.billing}"
        th:data-message-order-update-error="#{message.order.update.error}"
        th:data-message-order-create-error="#{message.order.create.error}"
        th:data-message-order-submit-error="#{message.order.submit.error}"
        th:data-message-confirm-clear-order="#{message.confirm.clear.order}"
        th:data-label-total-to-pay="#{label.total.to.pay}" th:data-button-add-to-order="#{button.add.to.order}"
        th:data-label-all-products="#{label.all.products}" th:data-status-available="#{table.status.available}"
        th:data-status-occupied="#{table.status.occupied}" th:data-status-billing="#{table.status.billing}"
        th:data-message-order-is-empty="#{message.order.is.empty}"
        th:data-message-order-is-empty-hint="#{message.order.is.empty.hint}"
        th:data-button-load-table="#{button.load.table}" th:data-label-reassign="#{label.reassign}"
        th:data-label-order="#{dashboard.js.order.hash}" th:data-label-paid="#{label.order.status.paid}"
        th:data-label-unpaid="#{label.order.status.unpaid}" th:data-label-canceled="#{label.order.status.canceled}"
        th:data-message-confirm-cancel-order="#{message.confirm.cancel.order}" th:data-button-pay="#{button.pay.now}"
        th:data-button-cancel="#{button.cancel}" th:data-label-assign-table="#{label.assign.table}"
        th:data-label-table-name="#{label.table.name}">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/counter.js}"></script>
</body>

</html>
