<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastBite - Counter POS</title>
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/counter.css}">
</head>

<body>
    <div class="pos-container">
        <!-- Categories Sidebar -->
        <div class="pos-sidebar">
            <div class="p-3 bg-dark text-center">
                <h4 class="m-0 text-white"><i class="fas fa-utensils me-2"></i>FastBite</h4>
            </div>
            <div class="cart-items flex-grow-1" id="categories-sidebar">
                <!-- Rendered JS -->
                <div class="category-item active" data-group-id="all">
                    <i class="fas fa-th me-2"></i> All Products
                </div>
            </div>
            <div class="p-3 mt-auto">
                <div class="d-flex align-items-center mb-3">
                    <div class="flex-grow-1">
                        <small class="text-white-50">Logged in as</small>
                        <div class="fw-bold" sec:authentication="name">User</div>
                    </div>
                </div>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-light btn-sm w-100">
                        <i class="fas fa-sign-out-alt me-1"></i> Logout
                    </button>
                </form>
            </div>
        </div>

        <!-- Main Product Area -->
        <div class="pos-main">
            <header class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm">
                <div class="input-group w-50">
                    <span class="input-group-text bg-transparent border-end-0"><i class="fas fa-search"></i></span>
                    <input type="text" class="form-control border-start-0" id="productSearch"
                        placeholder="Search products...">
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-secondary" id="btn-select-table">
                        <i class="fas fa-table me-1"></i> <span id="selected-table-name">Assign Table</span>
                    </button>
                    <a th:href="@{/dashboard}" class="btn btn-outline-primary">
                        <i class="fas fa-columns me-1"></i> Dashboard
                    </a>
                </div>
            </header>

            <div class="row g-3" id="products-grid">
                <!-- Rendered JS -->
            </div>
        </div>

        <!-- Cart Sidebar -->
        <div class="pos-cart">
            <div class="cart-header">
                <h5 class="m-0"><i class="fas fa-receipt me-2"></i> Current Order</h5>
            </div>
            <div class="cart-items" id="cart-items">
                <div class="text-center py-5 text-muted">
                    <i class="fas fa-shopping-cart fa-3x mb-3 opacity-25"></i>
                    <p>Order is empty</p>
                </div>
            </div>

            <div class="cart-total-section">
                <div class="d-flex justify-content-between mb-2">
                    <span>Subtotal</span>
                    <span id="cart-subtotal">€0,00</span>
                </div>
                <div class="cart-total-row">
                    <span>TOTAL</span>
                    <span id="cart-total">€0,00</span>
                </div>
                <div class="d-flex gap-2" id="cart-actions-new">
                    <button class="btn btn-outline-primary flex-grow-1" id="btn-assign-table" disabled>
                        <i class="fas fa-table me-2"></i> ASSIGN TO TABLE
                    </button>
                    <button class="btn btn-pos-primary btn-pay flex-grow-1" id="btn-proceed-payment" disabled>
                        <i class="fas fa-credit-card me-2"></i> PAY NOW
                    </button>
                </div>
                <div class="d-flex gap-2 d-none" id="cart-actions-edit">
                    <button class="btn btn-warning flex-grow-1 py-3 fw-bold" id="btn-save-order">
                        <i class="fas fa-save me-2"></i> SAVE
                    </button>
                    <button class="btn btn-info flex-grow-1 py-3 fw-bold text-white" id="btn-billing">
                        <i class="fas fa-file-invoice-dollar me-2"></i> BILLING
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Table Selection Modal -->
    <div class="modal fade" id="tableModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title">Select Table</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="table-grid" id="tables-list">
                        <!-- Tables from model -->
                        <div th:each="table : ${tables}" class="table-btn"
                            th:classappend="${table.active ? '' : 'opacity-50 pointer-events-none'}"
                            th:data-id="${table.id}" th:data-name="${table.name}" th:data-status="${table.status}">
                            <div class="status-indicator"
                                th:classappend="${'status-' + table.status.name().toLowerCase()}"></div>
                            <i class="fas fa-chair mb-1"></i><br>
                            <span th:text="${table.name}">T1</span>
                            <div class="table-status-label small" th:text="${table.status}">AVAILABLE</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div class="modal fade" id="paymentModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">Process Payment</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6 border-end">
                            <h6 class="text-muted mb-3">Order Summary</h6>
                            <div class="fs-4 mb-4 fw-bold text-center p-3 bg-light rounded">
                                Total to Pay: <span id="payment-total">€0,00</span>
                            </div>

                            <h6 class="text-muted mb-2">Payment Option</h6>
                            <div class="d-flex gap-2 mb-4">
                                <button class="btn btn-outline-success flex-grow-1 py-3 payment-method-btn active"
                                    data-method="CASH">
                                    <i class="fas fa-money-bill-wave fa-lg"></i><br>Cash
                                </button>
                                <button class="btn btn-outline-success flex-grow-1 py-3 payment-method-btn"
                                    data-method="CARD">
                                    <i class="fas fa-credit-card fa-lg"></i><br>Card
                                </button>
                            </div>

                            <div id="cash-payment-details">
                                <label class="form-label">Amount Received</label>
                                <input type="number" class="form-control form-control-lg mb-3" id="received-amount"
                                    step="0.01">
                                <div class="fs-5 text-center p-2 bg-info bg-opacity-10 rounded text-info">
                                    Change: <span id="payment-change">€0,00</span>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <h6 class="text-muted mb-3">Quick Cash</h6>
                            <div class="money-grid">
                                <div th:each="denom : ${paymentConfig.moneyDenominations}" class="money-btn"
                                    th:data-value="${denom.value}">
                                    <img th:src="${denom.image}" alt="cash">
                                </div>
                                <!-- Fallback if no images -->
                                <button th:if="${paymentConfig.moneyDenominations.isEmpty()}"
                                    class="btn btn-outline-secondary money-btn-val" data-value="5">5€</button>
                                <button th:if="${paymentConfig.moneyDenominations.isEmpty()}"
                                    class="btn btn-outline-secondary money-btn-val" data-value="10">10€</button>
                                <button th:if="${paymentConfig.moneyDenominations.isEmpty()}"
                                    class="btn btn-outline-secondary money-btn-val" data-value="20">20€</button>
                                <button th:if="${paymentConfig.moneyDenominations.isEmpty()}"
                                    class="btn btn-outline-secondary money-btn-val" data-value="50">50€</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success px-5 py-2 fw-bold" id="btn-complete-order">COMPLETE
                        ORDER</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Customization Modal (reuse if possible, otherwise Pos-specific) -->
    <div class="modal fade" id="customizationModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="product-modal-name">Customize</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="customization-options">
                    <!-- Dynamic -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary w-100" id="btn-add-with-customs">Add to Order</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Active Orders Modal -->
    <div class="modal fade" id="activeOrdersModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Active Orders - <span id="active-orders-table-name">Table</span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="active-orders-list" class="list-group">
                        <!-- Dynamic -->
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-primary w-100" id="btn-new-order-table">
                        <i class="fas fa-plus me-2"></i>New Order for this Table
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/counter.js}"></script>
</body>

</html>
